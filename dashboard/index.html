<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Combinatorial Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Combinatorial Dashboard</h1>
        <p id="updatedAt" class="muted">Loading...</p>
      </div>
      <span id="freshnessBadge" class="badge">--</span>
    </header>

    <main>
      <div id="dashboardErrors" class="dashboard-errors hidden" role="alert" aria-live="polite"></div>
      <section id="tab-predictions" class="tab active">
        <div class="card compact-card">
          <div class="meta-row">
            <span class="tiny muted">Latest Snapshot</span>
            <span id="predictionMeta" class="tiny muted">--</span>
          </div>
          <div id="validDrawSummary" class="tiny muted">Valid external draw IDs</div>
          <div id="validDrawRange" class="draw-range-row"></div>
        </div>

        <div class="accordion">
          <button class="accordion-trigger" type="button" data-accordion-target="individualTop10" aria-expanded="true">
            <h2>Top 10 Individual Numbers</h2>
            <span class="chevron">▾</span>
          </button>
          <div id="individualTop10" class="chip-grid accordion-panel open"></div>
        </div>

        <div class="section-divider"></div>

        <div class="accordion">
          <button class="accordion-trigger" type="button" data-accordion-target="pairsTop7" aria-expanded="true">
            <h2>Top 7 Pairs</h2>
            <span class="chevron">▾</span>
          </button>
          <div id="pairsTop7" class="chip-grid accordion-panel open"></div>
        </div>

        <div class="section-divider"></div>

        <div class="accordion">
          <button class="accordion-trigger" type="button" data-accordion-target="tripletsTop3" aria-expanded="true">
            <h2>Top 3 Triplet Combos</h2>
            <span class="chevron">▾</span>
          </button>
          <div id="tripletsTop3" class="chip-grid accordion-panel open"></div>
        </div>

        <div class="section-divider"></div>

        <div class="accordion">
          <button class="accordion-trigger" type="button" data-accordion-target="quadsTop3" aria-expanded="false">
            <h2>Top 3 Quads (No Overlap)</h2>
            <span class="chevron">▸</span>
          </button>
          <div id="quadsTop3" class="chip-grid accordion-panel"></div>
        </div>
      </section>

      <section id="tab-reconciliation" class="tab">
        <div class="card stats">
          <div>
            <div class="label">Pair Hits</div>
            <div id="pairHitsTotal" class="value">0</div>
          </div>
          <div>
            <div class="label">Triplet Hits</div>
            <div id="tripletHitsTotal" class="value">0</div>
          </div>
          <div>
            <div class="label">Quad Hits</div>
            <div id="quadHitsTotal" class="value">0</div>
          </div>
        </div>
        <div class="card">
          <h2>Prediction Reconciliation</h2>
          <div id="reconciliationPoints" class="rows"></div>
        </div>
      </section>

      <section id="tab-sequences" class="tab">
        <div class="card">
          <h2>Last 20 Sequences</h2>
          <div id="last20Sequences" class="rows"></div>
        </div>
      </section>
    </main>

    <nav class="tabbar">
      <button data-tab="predictions" class="tab-button active">Predictions</button>
      <button data-tab="reconciliation" class="tab-button">Reconciliation</button>
      <button data-tab="sequences" class="tab-button">Sequences</button>
    </nav>

    <script src="app.js"></script>
  </body>
</html>
